name = "gap-weekend-alarm-worker"
main = "src/index.ts"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "gap-weekend-alarm-db"
database_id = "394fea86-a108-417f-bf82-bceeb56ed5c1"

[vars]
# Set to "true" only in local .dev.vars — never enable in production
ALLOW_INSECURE_TURNSTILE_BYPASS = "false"
# Push delivery mode: "simulate" (log only) | "off" (silent no-op)
# Override to "off" in production until real WebPush is implemented
PUSH_MODE = "live"
# VAPID public key (non-sensitive, safe in [vars]). Generate with: npx web-push generate-vapid-keys
VAPID_PUBLIC_KEY = "BDjUZmaluWRK6U36hyXv-RTc4jsAyRh1pJq1ZTQOh2gs6uDqPKFAP1_DiME0dVaDZYa465JnOMqzjuEHDSTfLC0"
# VAPID subject: set via `wrangler secret put VAPID_SUBJECT` — keep out of source control

[triggers]
crons = ["* * * * *", "0 2 * * *"]
